<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E07</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
  </head>
  <body>
    <h4>Card columns</h4>

    <div class="row">
      <div class="col">
        <div class="p-3 rounded" style="background-color: rgb(92, 92, 230)">
          <div class="card bg-transparent border-0">
            <img src="car.png" class="card-img-top" alt="vuong vin" />

            <div class="card-body">
              <p class="card-text text-center">
                Some text inside the first card
              </p>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="p-3 rounded" style="background-color: rgb(239, 245, 57)">
          <div class="card bg-transparent border-0">
            <img src="car.png" class="card-img-top" alt="vuong vin" />

            <div class="card-body">
              <p class="card-text text-center">
                Some text inside the first card
              </p>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="p-3 rounded" style="background-color: rgb(226, 24, 54)">
          <div class="card bg-transparent border-0">
            <img src="car.png" class="card-img-top" alt="vuong vin" />

            <div class="card-body">
              <p class="card-text text-center">
                Some text inside the first card
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/bootstrap.bundle.min.js"></script>
  </body>
</html>
