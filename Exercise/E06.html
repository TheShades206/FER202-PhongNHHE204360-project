<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E06</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body style="background-color: #fcfcfc;">

    <!-- 1. Header (Navbar) -->
    <nav class="navbar navbar-light bg-light border-bottom py-2">
      <div class="container d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <a class="navbar-brand text-muted me-4" href="#">Navbar</a>
          <a class="nav-link text-muted me-3" href="#">Home</a>
          <a class="nav-link text-muted me-3" href="#">Link</a>
          <a class="nav-link text-muted dropdown-toggle" href="#">Dropdown</a>
        </div>
        <form class="d-flex">
          <input type="text" placeholder="Search" style="border: 1px solid #ccc; outline: none; padding: 4px 8px; font-size: 14px;">
          <button class="btn btn-outline-primary ms-2" style="border-radius: 0; padding: 4px 12px; font-size: 14px; border-color: #007bff; color: #007bff;">Search</button>
        </form>
      </div>
    </nav>

    <!-- 2. Carousel Banner -->
    <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="https://placehold.co/1920x530/cccccc/666666?text=1920+x+530" class="d-block w-100" alt="Slide 1">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <!-- 3. Title Section -->
    <div class="container my-5">
      <div class="mb-4">
        <h3 class="fw-normal text-secondary mb-1">NEW PRODUCT</h3>
        <p class="text-muted small">List product description</p>
      </div>

      <!-- 4. Product Cards Grid -->
      <div class="row">

            <div class="card-body">
              <h6 class="card-title text-secondary mb-2">Product</h6>
              <div class="d-flex justify-content-between align-items-center mb-3" style="font-size: 13px;">
                <span class="text-decoration-line-through text-muted">100.000 vnd</span>
                <span style="color: orange; font-weight: 500;">80.000 vnd</span>
              </div>
              <div class="btn-group border rounded-1 overflow-hidden" style="font-size: 13px;">
                <span class="btn btn-primary px-3 py-1 rounded-0" style="background-color: #1a4f80; border: none;">
                  <i class="bi bi-cart-fill"></i>
                </span>
                <a href="#" class="btn btn-light px-3 py-1 rounded-0 text-decoration-none border-start" style="color: #666; background: #fff;">
