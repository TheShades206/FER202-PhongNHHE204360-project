<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E08 - Form đặt vé máy bay</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-light">
    <div class="container my-5" style="max-width: 600px">
      <h2 class="fw-semibold">Form đặt vé máy bay</h2>

      <form class="bg-white p-4">
        <div class="mb-3">
          <label class="form-label small mb-1">Họ tên</label>
          <div class="input-group">
            <span class="input-group-text bg-dark-subtle">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" class="form-control" placeholder="Họ tên" />
            <span class="input-group-text bg-dark-subtle">vnđ</span>
          </div>
          <div class="form-text mt-1" style="font-size: 11px">
            Phải nhập 5 ký tự, in hoa....
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small mb-1">Địa chỉ</label>
          <input type="text" class="form-control" />
          <div class="form-text mt-1" style="font-size: 11px">
            Phải nhập 5 ký tự, in hoa....
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-6">
            <label class="form-label small mb-1">Đi từ</label>
            <select class="form-select">
              <option selected>Hà nội</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label small mb-1">Đến</label>
            <select class="form-select">
              <option selected>Hà nội</option>
            </select>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small mb-1 d-block"
            >Chọn chiều đi (Khứ hồi)</label
          >
          <div class="form-check mb-1">
            <input class="form-check-input" type="checkbox" id="checkDi" />
            <label class="form-check-label small" for="checkDi">Đi</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="checkVe" />
            <label class="form-check-label small" for="checkVe">Về</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">Đặt vé</button>
      </form>
    </div>

    <script src="./js/bootstrap.bundle.min.js"></script>
  </body>
</html>
